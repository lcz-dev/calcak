  <text x="22" y="420" font-family="Inter,-apple-system,sans-serif" font-size="12" fill="#0F172A">→  Day trip ideas</text>
  <!-- Divider -->
  <line x1="20" y1="440" x2="140" y2="440" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Minimal skyline silhouette -->
  <rect x="18" y="490" width="6"  height="50" fill="#E2E8F0"/>
  <rect x="28" y="475" width="8"  height="65" fill="#CBD5E1"/>
  <rect x="40" y="460" width="10" height="80" fill="#94A3B8"/>
